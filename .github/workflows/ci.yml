name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          echo "TELEGRAM_BOT_TOKEN=dummy" >> .env
          echo "TELEGRAM_CHAT_ID=0" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 10

      - name: Check container status
        run: docker compose ps

      - name: Test root endpoint (or /health)
        run: |
          curl --fail http://localhost/ || exit 1

      - name: Test /metrics endpoint
        run: |
          curl --fail http://localhost/metrics || exit 1

      - name: Check Prometheus targets
        run: |
          curl --fail http://localhost:9090/api/v1/targets || exit 1

      - name: Show logs if failed (debug)
        if: failure()
        run: docker compose logs